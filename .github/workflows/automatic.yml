name: Automatic

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'

jobs:
  build_and_check:
    if: github.repository == 'alrikn/Zappy'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Godot 4.6
        run: |
          GODOT_TAG="4.6-stable"
          GODOT_TPLDIR="$HOME/.local/share/godot/export_templates/4.6.stable"

          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_TAG}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_export_templates.tpz" -O templates.tpz
          mkdir -p "$GODOT_TPLDIR"
          unzip -q templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "$GODOT_TPLDIR/"

      - name: Compile project
        run: make
        timeout-minutes: 20

      - name: Verify executable
        run: |
          echo "${{ vars.EXECUTABLE }}" | tr -d '\r' | while read -r exe; do
              #now we check if that file exists
              if [ ! -f "$exe" ]; then
                  echo "Executable $exe not found!"
                  exit 1
              fi
          done
          echo "all executables found."

      #- name: Run tests
      #  run: ./raytracer scene_config.cfg -o output.ppm
      #  timeout-minutes: 2 #if it can't be done in 2 minutes, it's bad and something has gone wrong

      - name: Clean
        if: always()
        run: make fclean

  push_to_mirror:
    needs: build_and_check
    if: github.repository == 'alrikn/Zappy' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ secrets.EPITECH_REPO_SSH }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}